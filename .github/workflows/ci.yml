name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-and-test:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      MONGO_URI: mongodb://localhost:27017/reverse_match_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-test-access-secret-32-chars-minimum
      JWT_REFRESH_SECRET: ci-test-refresh-secret-32-chars-minimum
      PORT: 5000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run lint
        working-directory: backend
        run: npm run lint

      - name: Run tests
        working-directory: backend
        run: npm test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: backend-lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: backend
        run: docker build -t reverse-match-api:${{ github.sha }} .

      - name: Verify image runs
        run: |
          docker run -d --name test-api \
            -e NODE_ENV=test \
            -e MONGO_URI=mongodb://localhost:27017/test \
            -e JWT_ACCESS_SECRET=ci-test-access-secret-32-chars-minimum \
            -e JWT_REFRESH_SECRET=ci-test-refresh-secret-32-chars-minimum \
            -p 5000:5000 \
            reverse-match-api:${{ github.sha }}
          sleep 3
          docker logs test-api
          docker stop test-api
