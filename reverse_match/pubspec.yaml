name: reverse_match
description: "Reverse Match - Dating app where girls choose first"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  socket_io_client: ^3.0.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Auth / Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5
  google_sign_in: ^6.2.2

  # UI
  cached_network_image: ^3.4.1
  flutter_card_swiper: ^7.0.1
  smooth_page_indicator: ^1.2.0
  shimmer: ^3.0.0

  # Media
  image_picker: ^1.1.2

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Utility
  intl: ^0.20.2
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  flutter_dotenv: ^5.2.1
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.9.4
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - .env
    - .env.production
    - .env.staging
